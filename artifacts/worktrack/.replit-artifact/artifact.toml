kind = "mobile"
previewPath = "/"
title = "WorkTrack"
version = "1.0.0"
id = "artifacts/worktrack"
router = "expo-domain"

[[integratedSkills]]
name = "expo"
version = "1.0.0"

[[services]]
ensurePreviewReachable = "/status"
localPort = 24073
name = "expo"
paths = ["/"]

[services.development]
run = "pnpm --filter @workspace/worktrack run dev"

[services.env]
PORT = "24073"
BASE_PATH = "/"

[services.production]
build = ["pnpm", "--filter", "@workspace/worktrack", "run", "build"]
run = ["pnpm", "--filter", "@workspace/worktrack", "run", "serve"]
